<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envanter Yönetim Paneli</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="bg-dark text-white p-3 vh-100" style="width: 250px;">
            <h4>Envanter Paneli</h4>
            <ul class="nav flex-column">
                <li class="nav-item"><a href="scan.html" class="nav-link text-white">Barkod Tara</a></li>
                <li class="nav-item"><a href="envanter.html" class="nav-link text-white">Envanter Yönetimi</a></li>
                <li class="nav-item" data-role-link="logs"><a href="log.html" class="nav-link text-white">Log Kayıtları</a></li>
                <li class="nav-item" data-role-link="users"><a href="kullanıcı.html" class="nav-link text-white">Kullanıcı Yönetimi</a></li>
            </ul>
        </nav>

        <!-- Ana İçerik -->
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center">
                <h2>Envanter Listesi</h2>
                <div class="d-flex align-items-center gap-3">
                    <div class="text-center">
                        <img src="assets/user-role.svg" alt="Kullanıcı rolü" width="56" height="56">
                        <div id="currentUsername" class="small fw-semibold mt-1"></div>
                        <div id="userRole" class="badge bg-primary"></div>
                    </div>
                    <button class="btn btn-danger" onclick="logout()">Çıkış Yap</button>
                </div>
            </div>
            
            <!-- Ürün Ekleme Butonu -->
            <button class="btn btn-success my-3" onclick="openProductForm()">+ Yeni Envanter Ekle</button>
            

            <!-- Ürün Ekleme / Düzenleme Formu -->
            <div id="productForm" style="display: none;" class="card p-4">
                <h4 id="formTitle">Ürün Ekle</h4>
                <input type="hidden" id="productId">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Ürün Adı</label>
                        <input type="text" id="productName" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Departman</label>
                        <select id="productDepartment" class="form-select">
                            <option value="">Departman seçiniz</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Garanti Süresi</label>
                        <input type="text" id="productWarranty" class="form-control">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Marka</label>
                        <input type="text" id="productBrand" class="form-control">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Model</label>
                        <input type="text" id="productModel" class="form-control">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Kategori</label>
                        <select id="categorySelect" class="form-select">
                            <option value="">Kategori seçiniz</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Zimmetli Ad</label>
                        <input type="text" id="userFirstName" class="form-control">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Zimmetli Soyad</label>
                        <input type="text" id="userLastName" class="form-control">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Seri Numarası</label>
                        <input type="text" id="productSerialNumber" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Barkod</label>
                        <input type="text" id="productBarcode" class="form-control" placeholder="Boş bırakılırsa otomatik oluşturulur">
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="saveProduct()">Kaydet</button>
                <button class="btn btn-secondary" onclick="closeProductForm()">İptal</button>
            </div>

            <!-- Ürünler Tablosu -->
            <h4>Ürünler</h4>
            <input type="text" id="search" class="form-control" placeholder="Ürün Ara..." onkeyup="searchProducts()">
            
            <table class="table mt-3">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ürün Adı</th>
                        <th>Departman</th>
                        <th>Garanti Süresi</th>
                        <th>Marka</th>
                        <th>Model</th>
                        <th>Seri No</th>
                        <th>Barkod</th>
                        <th>İşlemler</th>
                    </tr>
                </thead>
                <tbody id="productTable"></tbody>
            </table>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>

<footer class="text-center p-3 bg-light">Municipal IT Inventory Management</footer>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envanter Kullanıcı Girişi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4" style="width: 350px;">
        <h3 class="text-center">Giriş Yap</h3>
        <div class="mb-3">
            <label class="form-label">Kullanıcı Adı</label>
            <input type="text" id="username" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Şifre</label>
            <input type="password" id="password" class="form-control">
        </div>
        <div id="errorMessage" class="text-danger text-center mb-2" style="display: none;">
            Hatalı giriş! Lütfen tekrar deneyin.
        </div>
        <button class="btn btn-primary w-100" onclick="login()">Giriş Yap</button>
    </div>
<!--Renderer.javascript den alıyor-->
    <script src="renderer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kullanıcı Yönetimi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4">
        <h2>Kullanıcı Yönetimi</h2>
        <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">Geri Dön</button>
        <hr>

        <button class="btn btn-success mb-3" onclick="openAddUserForm()">+ Yeni Kullanıcı Ekle</button>

        <!-- Kullanıcı Ekleme Formu -->
        <div id="addUserForm" style="display: none;" class="card p-4">
            <h4>Yeni Kullanıcı Ekle</h4>
            <div class="mb-3">
                <label for="newUsername">Kullanıcı Adı</label>
                <input type="text" id="newUsername" class="form-control">
            </div>
            <div class="mb-3">
                <label for="newPassword">Şifre</label>
                <input type="password" id="newPassword" class="form-control">
            </div>
            <div class="mb-3">
                <label for="newRole">Rol</label>
                <select id="newRole" class="form-select">
                    <option value="admin">Admin</option>
                    <option value="tech">Tech</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="saveUser()">Kaydet</button>
            <button class="btn btn-secondary" onclick="closeAddUserForm()">İptal</button>
        </div>

        <!-- Kullanıcılar Tablosu -->
        <table class="table mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Kullanıcı Adı</th>
                    <th>Rol</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <script src="kullanıcı.js"></script>
</body>
</html>

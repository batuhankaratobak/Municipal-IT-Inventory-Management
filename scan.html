<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barkod Tara</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Barkod Tara</h2>
            <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">Panele Dön</button>
        </div>

        <div class="card p-4 mb-4">
            <label for="barcodeInput" class="form-label">Barkod / Seri Numarası</label>
            <input type="text" id="barcodeInput" class="form-control form-control-lg" autocomplete="off" autofocus>
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-success" onclick="searchBarcode()">Ara</button>
                <button class="btn btn-secondary" onclick="clearResult()">Temizle</button>
            </div>
            <div id="scanMessage" class="mt-3"></div>
        </div>

        <div id="productResult" style="display: none;">
            <div class="card p-4 mb-4">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h3 id="resultProductName"></h3>
                    <div id="resultDepartment" class="text-muted"></div>
                </div>
                <span id="resultBarcode" class="badge bg-dark fs-6"></span>
            </div>

            <hr>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <strong>Marka</strong>
                    <div id="resultBrand"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <strong>Model</strong>
                    <div id="resultModel"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <strong>Seri Numarası</strong>
                    <div id="resultSerial"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <strong>Garanti Süresi</strong>
                    <div id="resultWarranty"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <strong>Zimmetli Kişi</strong>
                    <div id="resultAssignee"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <strong>Son Güncelleme</strong>
                    <div id="resultUpdated"></div>
                </div>
            </div>

            <button id="editProductButton" class="btn btn-warning">Düzenle</button>
            </div>

            <div class="row">
                <div class="col-lg-6 mb-4">
                    <div class="card p-4 h-100">
                        <h4>Arıza Kaydı Oluştur</h4>
                        <div class="mb-3">
                            <label for="issueTitle" class="form-label">Başlık</label>
                            <input type="text" id="issueTitle" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="issueDescription" class="form-label">Açıklama</label>
                            <textarea id="issueDescription" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="issueStatus" class="form-label">Durum</label>
                            <select id="issueStatus" class="form-select">
                                <option value="open">Açık</option>
                                <option value="in_progress">İşlemde</option>
                                <option value="resolved">Çözüldü</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="resolutionNote" class="form-label">Çözüm Notu</label>
                            <textarea id="resolutionNote" class="form-control" rows="2"></textarea>
                        </div>
                        <button class="btn btn-danger" onclick="createMaintenance()">Arıza Kaydı Oluştur</button>
                    </div>
                </div>

                <div class="col-lg-6 mb-4">
                    <div class="card p-4 h-100">
                        <h4>Departman / Zimmet Transferi</h4>
                        <div class="mb-3">
                            <label for="transferDepartment" class="form-label">Yeni Departman</label>
                            <select id="transferDepartment" class="form-select"></select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="transferFirstName" class="form-label">Zimmetli Ad</label>
                                <input type="text" id="transferFirstName" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="transferLastName" class="form-label">Zimmetli Soyad</label>
                                <input type="text" id="transferLastName" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="transferNote" class="form-label">Not</label>
                            <textarea id="transferNote" class="form-control" rows="3"></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="createTransfer()">Transfer Yap</button>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-6 mb-4">
                    <div class="card p-4 h-100">
                        <h4>Arıza Geçmişi</h4>
                        <div id="maintenanceHistory"></div>
                    </div>
                </div>
                <div class="col-lg-6 mb-4">
                    <div class="card p-4 h-100">
                        <h4>Transfer Geçmişi</h4>
                        <div id="movementHistory"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scan.js"></script>
</body>
</html>
